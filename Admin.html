<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenas Imóveis Admin</title>
    <link rel="stylesheet" href="./CSS/Style_Admin.css">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
</head>
<body>
    <nav>
        <!-- Ícone -->
         <a href="#">
            <img src="./assets/favicon.svg" alt="Logo" class="Logo">
         </a>

         <!-- Link para a página principal -->
          <ul>
            <li><a href="./index.html">Home</a></li>
          </ul>
    </nav>

    <div class="Cadastro">

    <form id="formCadastro">
        
        <h3 class="titulo-form">Cadastro de Imóveis</h3>

        <div class="campo largo">
            <label for="Nome">Nome: </label>
            <input type="text" id="Nome" placeholder="Nome do Imóvel" required />
        </div>

        <div class="campo largo">
            <label for="Descricao">Descrição: </label>
            <input type="text" id="Descricao" placeholder="Descrição detalhada do imóvel" required />
        </div>

        <div class="campo">
            <label for="Valor">Valor (R$): </label>
            <input type="number" id="Valor" min="0" step="0.01" required>
        </div>

        <div class="campo">
            <label for="Area">Área em m<sup>2</sup>: </label>
            <input type="number" id="Area" placeholder="Ex: 100" min="1" required>
        </div>
        
        <div class="campo">
            <label for="Quartos">Quartos: </label>
            <input type="number" id="Quartos" placeholder="Ex: 4" min="0" max="20" required>
        </div>

        <div class="campo">
            <label for="Tipo-Imovel">Tipo de Imóvel: </label>
            <select id="Tipo-Imovel">
                <option selected disabled>--- Selecione ---</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
                <option value="terreno">Terreno</option>
                <option value="sala">Sala</option>
            </select>
        </div>

        <div class="campo">
            <label for="Tipo-Negocio">Venda/Aluguel: </label>
            <select id="Tipo-Negocio">
                <option selected disabled>--- Selecione ---</option>
                <option value="venda">Venda</option>
                <option value="aluguel">Aluguel</option>
            </select>
        </div>

        <div class="campo">
            <label for="Finalidade">Finalidade: </label>
            <select id="Finalidade">
                <option selected disabled>--- Selecione ---</option>
                <option value="residencial">Residencial</option>
                <option value="comercial">Comercial</option>
            </select>
        </div>

        <div class="campo largo">
            <label for="Localizacao">Localização: </label>
            <input type="text" id="Localizacao" required>
        </div>

        <div class="campo largo">
            <label for="link-mapa">Link Google Maps: </label>
            <input type="url" id="link-mapa">
        </div>

        <div class="campo largo">
            <label for="Fotos">URLs das Fotos: </label>
            <textarea id="Fotos" rows="3" placeholder="Insira as URLs das fotos separadas por vírgula (Ex: http://link1.com/foto.jpg, http://link2.com/foto.jpg)"></textarea>
        </div>

        <div class="campo-checkbox largo">
            <label for="ativo">Ativo?</label>
            <input type="checkbox" id="ativo" checked>
        </div>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>

    </form>

</div>
    
</div>



    <footer>Buenas Imóveis - 2026 &copy; Nenhum direito reservado</footer>
</body>
</html>
